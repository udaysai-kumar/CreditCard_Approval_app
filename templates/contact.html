{% extends "base.html" %}
{% block title %}Contact{% endblock %}
{% block content %}
<section class="section" style="padding-top:60px">
  <div class="container" style="max-width:600px">
    <div class="eyebrow">Get in touch</div>
    <h1>Contact us</h1>
    <p style="margin-bottom:30px">Questions about the model, the dataset, or the project? Send us a note.</p>
    <form method="POST" data-validate novalidate class="glass-card" style="padding:32px">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
        <div class="field-error">Please enter your name.</div>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <div class="field-error">Please enter a valid email.</div>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
        <div class="field-error">Please enter a message.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send message</button>
    </form>
  </div>
</section>
{% endblock %}
